# ============================================================
# Minimal base config needed by pipeline_sweep_subfolders.py
# ============================================================

custom_path_to_save_data: ""

# preprocessing / image transforms
norm: true
inv: false
gauss_blur: false
gauss_teta: 1.0
hist_eq: false
preprocessed_data: "raw"

# ------------------------------------------------------------
# model / DINO
# ------------------------------------------------------------
model:
  name: "dinov2_vits14"
  checkpoint: ""

loader:
  batch_size: 8

# ------------------------------------------------------------
# spectral clustering
# ------------------------------------------------------------
spectral_clustering:
  K: 15
  which_matrix: "laplacian"
  which_color_matrix: "none"
  which_features: "k"
  normalize: true
  threshold_at_zero: true
  lapnorm: true

  image_downsample_factor: 1
  image_color_lambda: 0.0
  multiprocessing: false

  C_dino: 1.0
  C_ssd_knn: 0.0
  C_var_knn: 0.0
  C_pos_knn: 0.0

  max_knn_neigbors: 10

  C_ssd: 0.0
  C_ncc: 0.0
  C_lncc: 0.0
  C_ssim: 0.0
  C_mi: 0.0
  C_sam: 0.0

  patch_size: 5
  aff_sigma: 0.1

  distance_weight1: 1.0
  distance_weight2: 1.0

  use_transform: false

# ------------------------------------------------------------
# multi-region segmentation
# ------------------------------------------------------------
multi_region_segmentation:
  adaptive: false
  non_adaptive_num_segments: 15
  infer_bg_index: false
  clustering1: "kmeans"
  num_eigenvectors: 15
  multiprocessing: false

# ------------------------------------------------------------
# bounding boxes
# ------------------------------------------------------------
bbox:
  num_clusters: 6
  num_erode: 0
  num_dilate: 0
  skip_bg_index: false
  downsample_factor: 1

  C_pos: 1.0
  C_mask: 1.0
  feat_comb_method: "concat"
  apply_mask: true

  seed: 1
  pca_dim: 50
  clustering: "kmeans"
  should_use_siamese: false
  should_use_ae: false
  is_sparse_graph: false
  spectral_n_nbg: 10

# ------------------------------------------------------------
# CRF
# ------------------------------------------------------------
crf:
  num_classes: 6
  downsample_factor: 1
  multiprocessing: false
  w1: 15
  alpha: 7
  beta: 10
  w2: 5
  gamma: 5
  it: 10

# ------------------------------------------------------------
# precomputed paths
# ------------------------------------------------------------
precomputed:
  mode: ""
  features: ""
  eig: ""
  multi_region_segmentation: ""
  crf_multi_region: ""
  bboxes: ""
  bbox_features: ""
  bbox_clusters: ""
  segmaps: ""
  crf_segmaps: ""

# ------------------------------------------------------------
# evaluation
# ------------------------------------------------------------
eval:
  eval_per_image: false
  iou_thresh: 0.5
  void_label: 255
  vis_rand_k: 20
