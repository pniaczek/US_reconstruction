defaults:
  - dataset: hamzaoran_unsup_tv_seg50_clust15
  - sweep: hamzaoran_unsup_tv_seg50_clust15_clusters
  - wandb: defaults
  - vis: selected
  - pipeline_steps: defaults
  - _self_

custom_path_to_save_data: ""
norm: none
inv: false
gauss_blur: false
gauss_teta: 1.0
hist_eq: false
preprocessed_data: raw

model:
  name: dinov2_vits14
  checkpoint: ""

loader:
  batch_size: 1

spectral_clustering:
  K: 50
  which_matrix: laplacian
  which_color_matrix: none
  which_features: k
  normalize: true
  threshold_at_zero: true
  lapnorm: true
  image_downsample_factor: 7
  image_color_lambda: 0.0
  multiprocessing: false
  C_dino: 1.0
  C_ssd_knn: 0.0
  C_var_knn: 0.0
  C_pos_knn: 0.0
  max_knn_neigbors: 10
  C_ssd: 0.0
  C_ncc: 0.0
  C_lncc: 0.0
  C_ssim: 0.0
  C_mi: 0.0
  C_sam: 0.0
  patch_size: 5
  aff_sigma: 0.1
  distance_weight1: 1.0
  distance_weight2: 1.0
  use_transform: false

multi_region_segmentation:
  adaptive: false
  non_adaptive_num_segments: 50
  infer_bg_index: false
  clustering1: kmeans_eigen
  num_eigenvectors: 50
  multiprocessing: false

bbox:
  num_clusters: 15
  num_erode: 0
  num_dilate: 0
  skip_bg_index: false
  downsample_factor: 1
  C_pos: 1.0
  C_mask: 1.0
  feat_comb_method: concat
  apply_mask: true
  seed: 1
  pca_dim: 50
  clustering: kmeans
  should_use_siamese: false
  should_use_ae: false
  is_sparse_graph: false
  spectral_n_nbg: 10

crf:
  num_classes: 15
  downsample_factor: 1
  multiprocessing: false
  w1: 15
  alpha: 7
  beta: 10
  w2: 5
  gamma: 5
  it: 10

precomputed:
  mode: ""
  features: ""
  eig: ""
  multi_region_segmentation: ""
  crf_multi_region: ""
  bboxes: ""
  bbox_features: ""
  bbox_clusters: ""
  segmaps: ""
  crf_segmaps: ""

eval:
  eval_per_image: false
  iou_thresh: 0.5
  void_label: 255
  vis_rand_k: 20
